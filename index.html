<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Age Project</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="container">
    <!-- <img src="image/j1.jpg" alt=""> -->

    <div class="div1">
      <div>
        <div class="div-inp">
          <label for="input">DAY</label><br />
          <input type="text" placeholder="DD" class="input-d" />
        </div>
        <div class="div-inp">
          <label for="input">MONTH</label><br />
          <input type="text" placeholder="MM" class="input-d" />
        </div>
        <div class="div-inp">
          <label for="input">YEAR</label><br />
          <input type="text" placeholder="YYYY" class="input-d" />
        </div>
      </div>

      <div class="line">
        <hr class="inline-block">
        <button class="age-submit"><img  class="btn-img" src="image/done.png" alt=""></button>
      </div>

      <div class="content">
        <p class="para"><span>--</span>years</p>
        <p class="para"><span>--</span>month</p>
        <p class="para"><span>--</span>days</p>
      </div>
    </div>
  </body>
</html>
